<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Johnny Taxi</title>
  <style>
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      color: #c9a84c;
    }
    .dot { animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  </style>
</head>
<body>
  <span class="dot">●</span>&nbsp;<span class="dot">●</span>&nbsp;<span class="dot">●</span>

  <script>
    /**
     * IP-based language redirect for Johnny Taxi
     *
     * Logic:
     *   1. Fetch the visitor's country code via ipapi.co (free, no key needed)
     *   2. If country is KR  → go to index.html   (Korean)
     *   3. All other countries → go to index_en.html (English)
     *   4. On any error (network, rate-limit, etc.) → fallback to index.html
     *
     * To use:
     *   - Deploy this file as the site root (e.g. rename to index.html and
     *     rename the Korean page to index_ko.html), OR
     *   - Keep your current index.html / index_en.html as-is and name this
     *     file something like "redirect.html", then configure your server
     *     (GitHub Pages custom 404, Cloudflare Worker, etc.) to serve it first.
     *
     * GitHub Pages tip:
     *   GitHub Pages always serves index.html first. The simplest approach is:
     *     - index.html         ← this redirect script  (rename current index.html to index_ko.html)
     *     - index_ko.html      ← Korean page
     *     - index_en.html      ← English page
     */

    (async function () {
      const KO_PAGE = 'index_ko.html';   // ← change if your Korean file has a different name
      const EN_PAGE = 'index_en.html';

      try {
        const res  = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
        const data = await res.json();
        const cc   = (data.country_code || '').toUpperCase();
        window.location.replace(cc === 'KR' ? KO_PAGE : EN_PAGE);
      } catch (_) {
        // Network error or timeout — default to Korean page
        window.location.replace(KO_PAGE);
      }
    })();
  </script>
</body>
</html>
